name: Release extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive release version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          if [[ ! "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(\.([0-9]+))?$ ]]; then
            echo "Tag must look like v1.2.3 or v1.2.3.4" >&2
            exit 1
          fi

          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Prepare release bundle
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p build/release
          cp -R src/. build/release/

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest_path = Path("build/release/manifest.json")
          manifest = json.loads(manifest_path.read_text())
          release_version = os.environ["RELEASE_VERSION"]

          manifest["version"] = release_version

          manifest_path.write_text(json.dumps(manifest, indent=2) + "\n")
          PY

          cd build/release
          zip -r "../../accounthop-for-aws-${RELEASE_VERSION}.zip" . -x "*.DS_Store"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: accounthop-for-aws-${{ steps.version.outputs.version }}.zip